set timeout=3

loadfont unicode

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

if [ -s ($root)/boot/grub/theme/theme.cfg ]; then
        source ($root)/boot/grub/theme/theme.cfg
fi

menuentry "Start redeployment" {
        set gfxpayload=keep
        linux   /casper/vmlinuz nopersistent ds=nocloud\;s=/cdrom/cloud-configs/redeploy --- nomodeset modprobe.blacklist=nouveau nouveau.modeset=0 autoinstall rp-partuuid=RP_PARTUUID
        initrd  /casper/initrd
}
menuentry "Start normal reset installation" {
        set gfxpayload=keep
        linux   /casper/vmlinuz nopersistent ds=nocloud\;s=/cdrom/cloud-configs/reset-media --- nomodeset modprobe.blacklist=nouveau nouveau.modeset=0
        initrd  /casper/initrd
}
grub_platform
if [ "$grub_platform" = "efi" ]; then
menuentry 'UEFI firmware settings' {
        fwsetup
}
fi

